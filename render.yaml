# Render Blueprint：Dashboard → New → Blueprint → 連結此 repo 即可套用
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: diet-linebot
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        sync: false
      # Supabase Direct 在 Render 常無 IPv4；設區域可自動改連 Session pooler :5432
      - key: SUPABASE_REGION
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
