# 台灣時間每天 20:30 觸發晚餐提醒（UTC 12:30）
# 需設定：
#   RENDER_BASE_URL = https://你的服務.onrender.com
#   CRON_SECRET     = 與 Render 環境變數 CRON_SECRET 相同

name: Meal reminder evening

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch:

jobs:
  trigger-render-cron:
    runs-on: ubuntu-latest
    steps:
      - name: POST meal-reminder evening
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$BASE_URL" ] || [ -z "$SECRET" ]; then
            echo "::error::請設定 Actions secrets：RENDER_BASE_URL、CRON_SECRET"
            exit 1
          fi
          curl -sS -f -X POST "$BASE_URL/cron/meal-reminder?slot=evening" \
            -H "X-Cron-Secret: $SECRET" \
            -H "Content-Type: application/json"
