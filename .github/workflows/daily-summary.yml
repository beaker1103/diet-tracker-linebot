# 台灣時間每天 22:00 觸發 Render 上的每日推播（UTC 14:00，無夏令時間）
# 請在 GitHub repo → Settings → Secrets and variables → Actions 設定：
#   RENDER_CRON_URL = https://你的服務.onrender.com/cron/daily-summary
#   CRON_SECRET     = 與 Render 環境變數 CRON_SECRET 相同的長隨機字串

name: Daily LINE summary

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  trigger-render-cron:
    runs-on: ubuntu-latest
    steps:
      - name: POST daily-summary
        env:
          URL: ${{ secrets.RENDER_CRON_URL }}
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SECRET" ]; then
            echo "::error::請設定 Actions secret：CRON_SECRET"
            exit 1
          fi

          # 去除 secret 可能含有的換行/空白
          URL="$(echo -n "${URL:-}" | tr -d '\r\n\t ')"
          BASE_URL="$(echo -n "${BASE_URL:-}" | tr -d '\r\n\t ')"

          # 優先使用 RENDER_CRON_URL；若缺失或格式不合法，回退到 RENDER_BASE_URL
          valid_url=0
          case "$URL" in
            http://*|https://*) valid_url=1 ;;
          esac
          if [ "$valid_url" -ne 1 ]; then
            if [ -z "$BASE_URL" ]; then
              echo "::error::請設定 Actions secrets：RENDER_CRON_URL 或 RENDER_BASE_URL"
              exit 1
            fi
            case "$BASE_URL" in
              http://*|https://*) ;;
              *)
                echo "::error::RENDER_BASE_URL 格式錯誤（需以 http:// 或 https:// 開頭）"
                exit 1
                ;;
            esac
            BASE_URL="${BASE_URL%/}"
            URL="${BASE_URL}/cron/daily-summary"
          fi

          echo "Trigger URL prepared."
          tmp="$(mktemp)"
          code=$(curl -sS -X POST "$URL" \
            -H "X-Cron-Secret: $SECRET" \
            -H "Content-Type: application/json" \
            --retry 4 --retry-all-errors --retry-delay 5 \
            -o "$tmp" -w "%{http_code}")
          echo "HTTP $code"
          cat "$tmp"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::daily-summary cron failed with HTTP $code"
            exit 1
          fi
